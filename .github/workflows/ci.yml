name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: broadcast
          POSTGRES_PASSWORD: broadcast
          POSTGRES_DB: broadcast_erp
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U broadcast -d broadcast_erp"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://broadcast:broadcast@localhost:5432/broadcast_erp?schema=public
      DIRECT_DATABASE_URL: postgresql://broadcast:broadcast@localhost:5432/broadcast_erp?schema=public
      APP_URL: http://localhost:3000
      API_URL: http://localhost:4000
      JWT_ACCESS_SECRET: test-access-secret-at-least-32-characters
      JWT_REFRESH_SECRET: test-refresh-secret-at-least-32-characters
      FIELD_ENCRYPTION_KEY: test-field-key
      FIELD_ENCRYPTION_KEY_VERSION: "1"
      REDIS_URL: redis://localhost:6379
      S3_ENDPOINT: http://localhost:9000
      S3_REGION: us-east-1
      S3_BUCKET: broadcast-erp
      S3_ACCESS_KEY_ID: minio
      S3_SECRET_ACCESS_KEY: minio123
      CORS_ORIGINS: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @broadcast/database prisma:validate
      - run: pnpm --filter @broadcast/database prisma:generate
      - run: pnpm --filter @broadcast/types --filter @broadcast/auth --filter @broadcast/database --filter @broadcast/api --filter @broadcast/web --filter @broadcast/desktop typecheck
      - run: pnpm --filter @broadcast/api lint
      - run: pnpm --filter @broadcast/web lint
      - run: pnpm --filter @broadcast/desktop lint
      - run: pnpm --filter @broadcast/api test
      - run: pnpm --filter @broadcast/api build
      - run: pnpm --filter @broadcast/web build
      - run: pnpm --filter @broadcast/desktop build

  docker-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose --profile production config
      - run: docker build -f docker/api.Dockerfile -t broadcast-erp-api:ci .
      - run: docker build -f docker/web.Dockerfile -t broadcast-erp-web:ci .
