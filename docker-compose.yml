services:
  postgres:
    image: postgres:16-alpine
    container_name: broadcast-erp-postgres
    environment:
      POSTGRES_DB: broadcast_erp
      POSTGRES_USER: broadcast
      POSTGRES_PASSWORD: broadcast
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U broadcast -d broadcast_erp"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: broadcast-erp-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: broadcast-erp-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: broadcast-erp-api
    env_file:
      - path: .env
        required: false
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://broadcast:broadcast@postgres:5432/broadcast_erp?schema=public
      DIRECT_DATABASE_URL: postgresql://broadcast:broadcast@postgres:5432/broadcast_erp?schema=public
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    profiles: ["local", "production"]

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    container_name: broadcast-erp-web
    env_file:
      - path: .env
        required: false
    environment:
      API_URL: http://api:4000
    ports:
      - "3000:3000"
    depends_on:
      - api
    profiles: ["local", "production"]

  worker:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: broadcast-erp-worker
    env_file:
      - path: .env
        required: false
    environment:
      PORT: 4001
      DATABASE_URL: postgresql://broadcast:broadcast@postgres:5432/broadcast_erp?schema=public
      DIRECT_DATABASE_URL: postgresql://broadcast:broadcast@postgres:5432/broadcast_erp?schema=public
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      WORKER_MODE: "true"
    command: ["node", "dist/main.js"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles: ["production"]

  backup:
    image: postgres:16-alpine
    container_name: broadcast-erp-backup
    environment:
      PGPASSWORD: broadcast
      BACKUP_SCHEDULE_CRON: "0 2 * * *"
    volumes:
      - ./backups:/backups
      - ./scripts:/scripts:ro
    entrypoint: ["/bin/sh", "/scripts/backup-postgres.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["production"]

volumes:
  postgres_data:
  minio_data:
